spring.application.name=digital-banking-system
# Server Configuration
server.port=8080

# Admin Master Key (set ADMIN_MASTER_KEY environment variable in production!)
app.admin.master-key=${ADMIN_MASTER_KEY:CHANGE_ME_IN_PRODUCTION}

# File Storage Configuration (Using JSON files instead of database)
# Data files are stored in the 'data/' directory

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true

# Logging
logging.level.com.spring_project.digital_banking_system=INFO
logging.level.org.springframework.security=INFO
